<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V11 - Ultra Stability</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c27;
            --accent: #4f46e5;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --err: #ef4444;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            z-index: 10;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800;
        }

        .nav-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: left;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:hover {
            background: rgba(79, 70, 229, 0.15);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Main View */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai { 
            background: var(--card); 
            align-self: flex-start; 
            border: 1px solid rgba(255,255,255,0.05);
            color: #d1d5db;
        }
        
        .message.user { 
            background: var(--accent); 
            color: white; 
            align-self: flex-end; 
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--err);
            color: #fca5a5;
            align-self: center;
            max-width: 95%;
            text-align: center;
        }

        /* Input Area */
        .input-wrapper {
            padding: 24px 40px;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .input-box {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e2d;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            padding: 8px 12px;
            align-items: center;
            gap: 12px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .preview-thumb {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
            border: 1px solid var(--accent);
        }

        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="header">
            <div class="logo">V</div>
            <div style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">SOULY <span style="color:var(--accent)">VAULT</span></div>
        </div>

        <button class="nav-btn" onclick="document.getElementById('file-picker').click()">
            🖼️ Tải lên hình ảnh
        </button>
        <input type="file" id="file-picker" hidden accept="image/*" onchange="previewImage(this)">
        
        <img id="thumb" class="preview-thumb">

        <button class="nav-btn" onclick="location.reload()" style="margin-top: 12px; background: rgba(239, 68, 68, 0.05);">
            🔄 Làm mới ứng dụng
        </button>

        <div style="margin-top: auto; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px;">
            <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 4px;">KÊNH TRUYỀN TẢI</div>
            <div style="font-size: 12px; font-weight: 600; color: #22c55e;">● SECURE_CORE_V11</div>
        </div>
    </div>

    <div class="main">
        <div id="chat-window">
            <div class="message ai">
                Chào bạn! Bản <b>V11</b> đã được cấu trúc lại hoàn toàn để xử lý lỗi 403 và lỗi nạp JSON mà bạn gặp phải.
                <br><br>
                <b>Lưu ý cực kỳ quan trọng:</b> Hãy gõ 1 câu chào bất kỳ (ví dụ: "Hi") trước khi gửi ảnh để hệ thống khởi tạo phiên làm việc ổn định.
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Hỏi về hình ảnh hoặc nhập tin nhắn..." onkeydown="if(event.key==='Enter') startProcess()">
                <button class="send-btn" id="sendBtn" onclick="startProcess()">GỬI</button>
            </div>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // Môi trường sẽ tự nạp key
    let currentImageBase64 = null;
    let isProcessing = false;

    function pushMsg(role, text) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `message ${role}`;
        d.innerHTML = text;
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    function previewImage(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            currentImageBase64 = e.target.result.split(',')[1];
            const thumb = document.getElementById('thumb');
            thumb.src = e.target.result;
            thumb.style.display = 'block';
            pushMsg('ai', '<i>Đã nhận ảnh. Hệ thống đã sẵn sàng phân tích.</i>');
        };
        reader.readAsDataURL(file);
    }

    async function startProcess() {
        const inputEl = document.getElementById('userInput');
        const query = inputEl.value.trim();
        
        if ((!query && !currentImageBase64) || isProcessing) return;

        pushMsg('user', query || "Hãy phân tích hình ảnh này");
        inputEl.value = '';
        toggleUI(true);

        const payload = {
            contents: [{
                parts: [
                    { text: query || "Mô tả nội dung hình ảnh này một cách chi tiết." },
                    ...(currentImageBase64 ? [{ inlineData: { mimeType: "image/png", data: currentImageBase64 } }] : [])
                ]
            }]
        };

        try {
            const res = await callGemini(payload);
            
            // Xử lý nếu res trả về không hợp lệ (lỗi fetch)
            if (!res) {
                throw new Error("Không nhận được phản hồi từ Gateway.");
            }

            const data = await res.json();
            
            if (data.error) {
                if (data.error.message.includes("unregistered callers")) {
                    throw new Error("Hệ thống chưa xác thực xong. Hãy gửi một tin nhắn văn bản (không kèm ảnh) trước để kích hoạt.");
                }
                throw new Error(data.error.message);
            }

            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi từ trí tuệ nhân tạo.";
            pushMsg('ai', reply.replace(/\n/g, '<br>'));

        } catch (e) {
            console.error("Critical Failure:", e);
            pushMsg('error', `<b>LỖI HỆ THỐNG:</b> ${e.message}<br><br><small>Hành động khuyên dùng: Nhấn nút "Làm mới ứng dụng" ở thanh bên trái.</small>`);
        } finally {
            toggleUI(false);
        }
    }

    function toggleUI(loading) {
        isProcessing = loading;
        const btn = document.getElementById('sendBtn');
        btn.disabled = loading;
        btn.innerText = loading ? "..." : "GỬI";
    }

    async function callGemini(payload, attempts = 3) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        for (let i = 0; i < attempts; i++) {
            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                // Nếu lỗi 403 hoặc 429, đợi và thử lại
                if (response.status === 403 || response.status === 429) {
                    await new Promise(r => setTimeout(r, 1500 * (i + 1)));
                    continue;
                }
                
                return response;
            } catch (err) {
                if (i === attempts - 1) return null;
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        return null;
    }
</script>

</body>
</html>
