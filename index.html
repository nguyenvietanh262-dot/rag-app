<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.9.3 - Tối ưu hiển thị trả lời</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c28;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: rgba(255,255,255,0.08);
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow: hidden; 
        }

        .app-container { display: flex; height: 100vh; }

        .sidebar {
            width: 300px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 24px; display: flex; flex-direction: column; overflow-y: auto;
        }

        .brand { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 25px; letter-spacing: 1px; }

        .section-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin: 15px 0 8px; letter-spacing: 1px; font-weight: bold; }

        .input-group, select {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; margin-bottom: 15px;
            width: 100%; color: white; outline: none; font-size: 14px;
        }

        .btn {
            background: var(--card); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px;
            cursor: pointer; width: 100%; margin-bottom: 8px; font-size: 13px; transition: 0.2s;
        }

        .btn:hover { border-color: var(--accent); background: rgba(139, 92, 246, 0.1); }
        .btn.primary { background: var(--accent); border: none; font-weight: 600; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0f; }

        #messages {
            flex: 1; overflow-y: auto; padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg {
            max-width: 85%; padding: 16px 20px; border-radius: 15px;
            line-height: 1.7; font-size: 15px; word-wrap: break-word;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.ai { 
            background: var(--card); align-self: flex-start; 
            border: 1px solid rgba(255,255,255,0.05);
            color: #e2e8f0;
        }

        /* Tối ưu hiển thị danh sách và đoạn văn trong câu trả lời AI */
        .msg.ai br { margin-bottom: 8px; content: ""; display: block; }
        .msg.ai strong { color: var(--accent); }
        .msg.ai ul, .msg.ai ol { margin: 10px 0; padding-left: 20px; }
        
        .msg.user { background: var(--accent); color: white; align-self: flex-end; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2); }
        .msg.system { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #fca5a5; align-self: center; font-size: 13px; border-radius: 8px; }

        .timestamp { font-size: 10px; opacity: 0.4; margin-top: 10px; display: block; text-align: right; }

        .footer { padding: 20px 40px; }

        .input-container {
            display: flex; gap: 12px; background: var(--card);
            padding: 10px 18px; border-radius: 15px;
            border: 1px solid var(--border); align-items: center;
        }

        .main-input {
            flex: 1; background: transparent; border: none;
            padding: 10px; color: white; font-size: 15px; outline: none;
        }

        #preview-container {
            display: none; margin-bottom: 12px; border: 2px solid var(--accent);
            border-radius: 10px; overflow: hidden; position: relative; max-width: 150px;
        }

        .loader {
            display: none; text-align: center; padding: 10px;
            color: var(--accent); font-size: 12px; font-weight: bold; font-style: italic;
        }

        pre { 
            background: #000; padding: 12px; border-radius: 8px; 
            overflow-x: auto; border: 1px solid var(--border); font-family: monospace; font-size: 13px;
        }
        code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">SOULY V12.9.3</div>

        <div class="section-label">Xác thực API</div>
        <input type="password" id="apiKey" class="input-group" placeholder="Dán API Key tại đây...">

        <div class="section-label">Model (Dành cho Key của bạn)</div>
        <select id="modelSelect" class="input-group">
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (Nhanh nhất)</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>

        <div class="section-label">Phụ trợ</div>
        <button class="btn" onclick="document.getElementById('file-input').click()">🖼️ Thêm hình ảnh</button>
        <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">

        <div id="preview-container">
            <img id="img-preview" src="" style="width:100%; display:block;">
            <button class="btn" style="position:absolute; bottom:5px; right:5px; width:auto; font-size:10px; padding:2px 6px;" onclick="clearImage()">Xóa</button>
        </div>

        <div style="margin-top:auto;">
            <button class="btn" onclick="clearHistory()">🗑️ Xóa lịch sử</button>
            <button class="btn" onclick="location.reload()">🔄 Tải lại</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages"></div>
        <div id="loader" class="loader">Đang suy nghĩ và trình bày ý kiến...</div>

        <div class="footer">
            <div class="input-container">
                <input type="text" id="userInput" class="main-input" placeholder="Nhập nội dung câu hỏi..." onkeydown="if(event.key==='Enter' && !isGenerating) startGeneration()">
                <button class="btn primary" id="sendBtn" onclick="startGeneration()" style="width: auto; margin: 0; padding: 10px 20px;">Gửi tin</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let currentMimeType = null;
    let isGenerating = false;
    let chatHistory = [];

    const STORAGE_KEY = "souly_v12_history";

    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) chatHistory = JSON.parse(saved);
        chatHistory.forEach(m => displayMessage(m.role, m.text, m.time, false));
    }

    function formatResponse(text) {
        // Chuyển đổi dấu xuống dòng thực tế thành thẻ <br>
        let formatted = text.replace(/\n/g, '<br>');
        
        // Định dạng in đậm **text**
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        // Định dạng code block ```code```
        formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        
        // Định dạng inline code `code`
        formatted = formatted.replace(/`(.*?)`/g, '<code>$1</code>');

        // Hỗ trợ danh sách gạch đầu dòng (thô)
        formatted = formatted.replace(/^\s*[-*]\s+(.*)/gm, '<li>$1</li>');
        if (formatted.includes('<li>')) {
            // Bao bọc các <li> bằng <ul> nếu cần (đơn giản hóa)
        }

        return formatted;
    }

    function displayMessage(role, text, time, shouldSave = true) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        
        const content = role === 'ai' ? formatResponse(text) : text;
        
        div.innerHTML = `${content}<span class="timestamp">${time}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;

        if (shouldSave) {
            chatHistory.push({role, text, time});
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
        }
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentImageBase64 = e.target.result.split(',')[1];
            currentMimeType = file.type;
            document.getElementById('img-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImageBase64 = null;
        document.getElementById('preview-container').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

    function clearHistory() {
        if(confirm("Xóa lịch sử?")) {
            localStorage.removeItem(STORAGE_KEY);
            chatHistory = [];
            document.getElementById('messages').innerHTML = '';
        }
    }

    async function startGeneration() {
        const text = document.getElementById('userInput').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('modelSelect').value;

        if (isGenerating || (!text && !currentImageBase64)) return;
        if (!apiKey) {
            displayMessage('system', 'Lỗi: Chưa nhập API Key.', 'Hệ thống');
            return;
        }

        displayMessage('user', text || "[Đã gửi ảnh]", new Date().toLocaleTimeString('vi-VN'));
        document.getElementById('userInput').value = '';
        
        isGenerating = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            const parts = [{ text: text || "Phân tích hình ảnh này bằng tiếng Việt, trình bày rõ ràng từng ý." }];
            if (currentImageBase64) parts.push({ inlineData: { mimeType: currentMimeType, data: currentImageBase64 } });

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts }],
                    systemInstruction: { parts: [{ text: "Bạn là Souly, một trợ lý AI thông minh. Hãy luôn trả lời bằng tiếng Việt. Trình bày nội dung chi tiết, các ý chính cần được xuống dòng và gạch đầu dòng rõ ràng để người dùng dễ đọc. Sử dụng Markdown để nhấn mạnh các từ khóa quan trọng." }] }
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            displayMessage('ai', aiText, new Date().toLocaleTimeString('vi-VN'));
            if (currentImageBase64) clearImage();
        } catch (err) {
            displayMessage('system', 'Lỗi: ' + err.message, 'Hệ thống');
        } finally {
            isGenerating = false;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }
    }

    window.onload = () => {
        loadHistory();
        if (chatHistory.length === 0) {
            displayMessage('ai', 'Chào mừng bạn! Tôi đã sẵn sàng trả lời các câu hỏi của bạn một cách chi tiết và rõ ràng nhất.', 'Souly');
        }
    };
</script>
</body>
</html>
