<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V6 - Pro API Connector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030305; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 200px); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .bg-glow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.2); }
        #log-console { font-family: monospace; font-size: 10px; color: #6366f1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-black to-black">

    <!-- Header -->
    <header class="p-4 border-b border-white/5 flex justify-between items-center glass">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-600/40">
                <i class="fas fa-brain text-white"></i>
            </div>
            <div>
                <h1 class="text-xs font-black tracking-widest uppercase">Souly Vault <span class="text-indigo-500">V6</span></h1>
                <div id="log-console">INIT_READY // SYSTEM_STABLE</div>
            </div>
        </div>
        <div class="flex items-center gap-4 text-[10px] font-mono">
            <div class="flex items-center gap-1.5">
                <span class="status-dot bg-green-500 shadow-[0_0_8px_#22c55e]"></span>
                <span id="api-status">API_CONNECTED</span>
            </div>
            <div class="text-white/40">LATENCY: <span id="latency">--ms</span></div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Media Panel -->
        <section class="w-1/3 p-6 border-r border-white/5 flex flex-col gap-4 bg-black/40">
            <div class="text-[10px] font-bold text-white/30 uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-microchip"></i> Visual Processing Unit
            </div>
            <div id="drop-zone" class="flex-1 glass rounded-2xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center relative overflow-hidden group hover:border-indigo-500 transition-all cursor-pointer">
                <div id="upload-hint" class="text-center transition-all group-hover:scale-110">
                    <i class="fas fa-cloud-upload-alt text-4xl text-indigo-500/50 mb-3"></i>
                    <p class="text-xs text-white/50 px-6">Click hoặc kéo thả tài liệu để AI quét dữ liệu</p>
                </div>
                <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain z-10" />
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>
            <button onclick="document.getElementById('file-input').click()" class="py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-bold transition-all border border-white/5 uppercase tracking-widest">
                Thay đổi nguồn dữ liệu
            </button>
        </section>

        <!-- Chat Panel -->
        <section class="flex-1 flex flex-col relative">
            <div id="chat-box" class="chat-container overflow-y-auto p-8 space-y-8 flex flex-col">
                <!-- AI Welcome -->
                <div class="flex gap-4 max-w-[80%]">
                    <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center flex-shrink-0 shadow-lg">
                        <i class="fas fa-robot text-xs"></i>
                    </div>
                    <div class="space-y-2">
                        <div class="text-[10px] font-bold text-indigo-400">SOULY_AI</div>
                        <div class="bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5 text-sm leading-relaxed">
                            Chào bạn! Tôi đã tối ưu hóa kết nối API. Mời bạn tải lên hóa đơn, tài liệu hoặc đặt câu hỏi trực tiếp.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent">
                <div class="max-w-4xl mx-auto glass rounded-2xl p-2 flex items-center shadow-2xl relative group focus-within:border-indigo-500/50 transition-all">
                    <div id="loading-bar" class="absolute top-0 left-0 h-[2px] bg-indigo-500 transition-all" style="width: 0%"></div>
                    <input type="text" id="user-input" 
                        class="flex-1 bg-transparent border-none py-4 px-6 text-sm focus:outline-none placeholder:text-white/20"
                        placeholder="Hỏi về hình ảnh hoặc bắt đầu cuộc hội thoại...">
                    <button id="send-btn" class="w-12 h-12 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all flex items-center justify-center shadow-lg hover:shadow-indigo-500/40">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; // Canvas tự động inject
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";
        
        let currentImageBase64 = null;
        let isProcessing = false;

        const ui = {
            input: document.getElementById('user-input'),
            btn: document.getElementById('send-btn'),
            chat: document.getElementById('chat-box'),
            file: document.getElementById('file-input'),
            preview: document.getElementById('preview'),
            hint: document.getElementById('upload-hint'),
            logs: document.getElementById('log-console'),
            loader: document.getElementById('loading-bar'),
            latency: document.getElementById('latency')
        };

        // File Handler
        ui.file.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            ui.logs.innerText = `UPLOADING: ${file.name.toUpperCase()}`;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 1200;
                    if(w > max) { h *= max/w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    ui.preview.src = canvas.toDataURL('image/jpeg');
                    ui.preview.classList.remove('hidden');
                    ui.hint.classList.add('hidden');
                    ui.logs.innerText = `DATA_SYNCED: ${w}x${Math.round(h)}px`;
                    ui.input.focus();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('drop-zone').onclick = () => ui.file.click();

        async function callGemini(prompt) {
            const startTime = Date.now();
            ui.loader.style.width = "40%";
            ui.logs.innerText = "API_REQUEST: SENDING_PAYLOAD...";

            const payload = {
                contents: [{
                    role: "user", // QUAN TRỌNG: Phải có role
                    parts: [{ text: prompt }]
                }]
            };

            if (currentImageBase64) {
                payload.contents[0].parts.push({
                    inlineData: { mimeType: "image/jpeg", data: currentImageBase64 }
                });
            }

            // Exponential Backoff Retry Logic
            let retries = 3;
            while (retries > 0) {
                try {
                    const response = await fetch(`${API_URL}?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(`HTTP_${response.status}: ${err.error?.message || 'Unknown'}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!text) throw new Error("EMPTY_RESPONSE");

                    ui.latency.innerText = `${Date.now() - startTime}ms`;
                    ui.loader.style.width = "100%";
                    setTimeout(() => ui.loader.style.width = "0%", 500);
                    return text;

                } catch (error) {
                    retries--;
                    ui.logs.innerText = `RETRYING... (${3-retries}/3) | ${error.message}`;
                    if (retries === 0) throw error;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        async function handleAction() {
            const msg = ui.input.value.trim();
            if (!msg || isProcessing) return;

            isProcessing = true;
            addMessage("User", msg, true);
            ui.input.value = "";
            ui.logs.innerText = "VPU_ACTIVE: ANALYZING...";

            try {
                const aiResponse = await callGemini(msg);
                addMessage("Souly AI", aiResponse);
                ui.logs.innerText = "SYSTEM_IDLE: READY_FOR_NEXT_INPUT";
            } catch (error) {
                addMessage("System Error", `Lỗi kết nối: ${error.message}. Hãy kiểm tra API Key hoặc kích thước ảnh.`, false, true);
                ui.logs.innerText = `CRITICAL_ERROR: ${error.message}`;
            } finally {
                isProcessing = false;
            }
        }

        function addMessage(sender, text, isUser = false, isError = false) {
            const div = document.createElement('div');
            div.className = `flex gap-4 ${isUser ? 'flex-row-reverse self-end ml-auto' : ''} max-w-[85%]`;
            div.innerHTML = `
                <div class="w-9 h-9 rounded-xl ${isUser ? 'bg-indigo-500' : (isError ? 'bg-red-500' : 'bg-white/10')} flex items-center justify-center flex-shrink-0 shadow-lg">
                    <i class="fas ${isUser ? 'fa-user' : 'fa-robot'} text-xs"></i>
                </div>
                <div class="space-y-2">
                    <div class="text-[10px] font-bold ${isUser ? 'text-right text-indigo-400' : (isError ? 'text-red-400' : 'text-gray-500')} uppercase">${sender}</div>
                    <div class="${isUser ? 'bg-indigo-600' : 'bg-white/5'} p-4 rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} border border-white/5 text-sm leading-relaxed whitespace-pre-wrap">
                        ${text}
                    </div>
                </div>
            `;
            ui.chat.appendChild(div);
            ui.chat.scrollTo({ top: ui.chat.scrollHeight, behavior: 'smooth' });
        }

        ui.btn.onclick = handleAction;
        ui.input.onkeydown = (e) => { if (e.key === 'Enter') handleAction(); };
        window.onload = () => ui.input.focus();
    </script>
</body>
</html>
