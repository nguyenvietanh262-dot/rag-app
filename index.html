<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V13 - Multi-Model Adaptive</title>
    <style>
        :root {
            --bg: #050507;
            --sidebar: #0f0f13;
            --card: #16161e;
            --accent: #8b5cf6;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --error: #ef4444;
            --border: rgba(255,255,255,0.08);
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .brand { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

        .config-group { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
        .label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--border); color: white; 
            padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 24px; }
        
        .msg { max-width: 85%; padding: 16px 20px; border-radius: 20px; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .msg.ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg.system { align-self: center; background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); font-size: 12px; border-radius: 10px; }

        .input-area { padding: 20px 15%; background: linear-gradient(transparent, var(--bg)); }
        .input-box { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            display: flex; align-items: center; padding: 8px 16px; gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .input-box input { border: none; background: transparent; margin: 0; flex: 1; font-size: 15px; }

        .loading { display: none; padding: 10px; color: var(--accent); font-size: 12px; font-weight: bold; text-align: center; letter-spacing: 2px; }

        pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; font-family: monospace; font-size: 13px; }
        code { color: #f8fafc; }
        .img-preview { width: 100%; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand"><div class="status-dot"></div> SOULY V13</div>
        
        <div id="history-list" style="flex:1; overflow-y:auto"></div>

        <div class="config-group">
            <label class="label">Priority Model</label>
            <select id="modelSelect">
                <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Recommended)</option>
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (Stable)</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            </select>

            <label class="label">API Key</label>
            <input type="password" id="apiKey" placeholder="Paste Google API Key...">
            
            <button onclick="createNewChat()" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">NEW SESSION</button>
        </div>
    </div>

    <div class="chat-main">
        <div id="chat-window"></div>
        
        <div class="input-area">
            <div id="loader" class="loading">ADAPTING CHANNEL...</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Nhập yêu cầu tại đây..." onkeydown="if(event.key==='Enter') startSequence()">
                <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this)">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--text-dim); cursor:pointer">🖼️</button>
                <button onclick="startSequence()" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer">SEND</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImg = null;
    let isProcessing = false;

    // Danh sách các ID mô hình dự phòng nếu mô hình chính lỗi
    const FALLBACK_MODELS = [
        "gemini-2.0-flash-exp",
        "gemini-1.5-flash",
        "gemini-1.5-flash-8b",
        "gemini-1.5-pro"
    ];

    function init() {
        const key = localStorage.getItem('souly_key');
        if(key) document.getElementById('apiKey').value = key;
        createNewChat();
    }

    function createNewChat() {
        document.getElementById('chat-window').innerHTML = `
            <div class="msg ai">Chào bạn! Tôi là Souly V13. Tôi đã được cập nhật hệ thống <b>Adaptive Model Selection</b> để tránh lỗi 'Model not found' bạn vừa gặp. Hãy thử lại nhé!</div>
        `;
    }

    function previewImage(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => currentImg = e.target.result;
        reader.readAsDataURL(file);
    }

    async function startSequence() {
        const text = document.getElementById('userInput').value.trim();
        const key = document.getElementById('apiKey').value.trim();
        const preferredModel = document.getElementById('modelSelect').value;

        if(!text || isProcessing) return;
        if(!key) return alert("Vui lòng nhập API Key!");

        localStorage.setItem('souly_key', key);
        isProcessing = true;
        document.getElementById('loader').style.display = 'block';
        
        // Hiển thị tin nhắn user
        addMessage('user', text, currentImg);
        document.getElementById('userInput').value = '';

        // Bắt đầu thử các mô hình
        let success = false;
        let modelsToTry = [preferredModel, ...FALLBACK_MODELS.filter(m => m !== preferredModel)];

        for(let model of modelsToTry) {
            try {
                const result = await callAPI(model, key, text, currentImg);
                addMessage('ai', result);
                success = true;
                break; 
            } catch (err) {
                console.warn(`Model ${model} failed, trying next...`, err);
            }
        }

        if(!success) {
            addMessage('system', "Tất cả các mô hình hiện tại đều không phản hồi. Vui lòng kiểm tra lại API Key hoặc trạng thái tài khoản Google AI của bạn.");
        }

        isProcessing = false;
        document.getElementById('loader').style.display = 'none';
        currentImg = null;
    }

    async function callAPI(model, key, text, img) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        
        const contents = [{ parts: [{ text }] }];
        if(img) {
            const b64 = img.split(',')[1];
            contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: b64 } });
        }

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents })
        });

        const data = await res.json();
        if(!res.ok) throw new Error(data.error?.message || "Unknown error");
        return data.candidates[0].content.parts[0].text;
    }

    function addMessage(role, text, img = null) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        
        let content = "";
        if(img) content += `<img src="${img}" class="img-preview">`;
        
        // Simple Markdown
        const formattedText = text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/\n/g, '<br>');

        div.innerHTML = content + formattedText;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    init();
</script>
</body>
</html>
