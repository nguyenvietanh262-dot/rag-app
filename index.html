<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.8 - History Saved</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c28;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 20px 0 10px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .input-group, select {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
            width: 100%;
            color: var(--success);
            font-family: 'JetBrains Mono', monospace;
        }

        .small-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--success);
            padding: 8px 0;
            font-size: 13px;
            outline: none;
        }

        .btn {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .btn.primary {
            background: var(--accent);
            border: none;
            font-weight: 600;
        }

        .btn.danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--error);
            color: #fca5a5;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.05), transparent);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }

        .msg.ai {
            background: var(--card);
            align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .msg.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
        }

        .msg.system {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
            align-self: center;
            font-size: 13px;
        }

        .timestamp {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 6px;
        }

        .footer {
            padding: 24px 40px;
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: var(--card);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            align-items: center;
        }

        .main-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        #preview-container {
            display: none;
            margin-bottom: 10px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #img-preview {
            width: 100%;
            display: block;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">✨ SOULY V12.8</div>
        
        <div class="section-label">Cấu hình API</div>
        <div class="input-group">
            <input type="password" id="apiKey" class="small-input" placeholder="Nhập Gemini API Key...">
        </div>

        <div class="section-label">Chọn Model</div>
        <select id="modelSelect" class="input-group">
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (Khuyến nghị)</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
            <option value="gemini-flash-latest">gemini-flash-latest</option>
        </select>

        <div class="section-label">Tệp tin</div>
        <button class="btn" onclick="document.getElementById('file-input').click()">🖼️ Chọn hình ảnh</button>
        <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
        
        <div id="preview-container">
            <img id="img-preview" src="">
            <button class="btn" style="position:absolute; bottom:5px; right:5px; width:auto; padding:5px 10px; margin:0; font-size:10px; background:rgba(0,0,0,0.7)" onclick="clearImage()">Xóa ảnh</button>
        </div>

        <div style="margin-top: auto;">
            <button class="btn danger" onclick="clearHistory()">🗑️ Xóa toàn bộ lịch sử</button>
            <button class="btn" onclick="location.reload()">Làm mới trang</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages"></div>
        
        <div id="loader" class="loader">ĐANG XỬ LÝ...</div>

        <div class="footer">
            <div class="input-container">
                <input type="text" id="userInput" class="main-input" placeholder="Hỏi tôi bất cứ điều gì..." onkeydown="if(event.key==='Enter') startGeneration()">
                <button class="btn primary" id="sendBtn" onclick="startGeneration()" style="width: 80px; margin-bottom: 0;">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let currentMimeType = null;
    let isGenerating = false;
    let chatHistory = [];

    const STORAGE_KEY = "souly_chat_history";

    function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            chatHistory = JSON.parse(saved);
            renderHistory();
        }
    }

    function renderHistory() {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `msg ${msg.role}`;
            div.innerHTML = `
                ${msg.text}
                <div class="timestamp">${msg.time}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function addMessage(role, text) {
        const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        
        const msgObj = { role, text, time };
        chatHistory.push(msgObj);
        saveHistory();

        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `
            ${text}
            <div class="timestamp">${time}</div>
        `;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function clearHistory() {
        if (confirm("Bạn có chắc muốn xóa toàn bộ lịch sử chat?")) {
            chatHistory = [];
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('messages').innerHTML = '';
            addMessage('ai', 'Lịch sử đã được xóa. Chúng ta bắt đầu cuộc trò chuyện mới nhé!');
        }
    }

    // Các hàm handleFile, clearImage, callGemini giữ nguyên như phiên bản trước
    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImageBase64 = e.target.result.split(',')[1];
            currentMimeType = file.type || "image/jpeg";
            document.getElementById('img-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImageBase64 = null;
        currentMimeType = null;
        document.getElementById('preview-container').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

        const
