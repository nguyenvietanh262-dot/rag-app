<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.6 - Fixed Connection</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c28;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 20px 0 10px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .input-group {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .small-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--success);
            padding: 8px 0;
            font-size: 13px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .btn.primary {
            background: var(--accent);
            border: none;
            font-weight: 600;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.05), transparent);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
        }

        .msg.ai {
            background: var(--card);
            align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .msg.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
        }

        .msg.system {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
            align-self: center;
            font-size: 13px;
        }

        /* Footer */
        .footer {
            padding: 24px 40px;
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: var(--card);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            align-items: center;
        }

        .main-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        #preview-container {
            display: none;
            margin-bottom: 10px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #img-preview {
            width: 100%;
            display: block;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">✨ SOULY V12.6</div>
        
        <div class="section-label">Cấu hình API</div>
        <div class="input-group">
            <input type="password" id="apiKey" class="small-input" placeholder="Nhập Gemini API Key...">
        </div>

        <div class="section-label">Tệp tin</div>
        <button class="btn" onclick="document.getElementById('file-input').click()">
            🖼️ Chọn hình ảnh
        </button>
        <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
        
        <div id="preview-container">
            <img id="img-preview" src="">
            <button class="btn" style="position:absolute; bottom:5px; right:5px; width:auto; padding:5px 10px; margin:0; font-size:10px; background:rgba(0,0,0,0.7)" onclick="clearImage()">Xóa</button>
        </div>

        <div style="margin-top: auto;">
            <button class="btn" onclick="location.reload()">Làm mới ứng dụng</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg ai">
                Chào bạn! Tôi đã sửa lỗi model.<br><br>
                Bản <b>V12.6 Fixed</b> hiện đang sử dụng model: <br>
                <code>gemini-2.5-flash</code><br><br>
                Hãy dán API Key và thử gửi tin nhắn hoặc hình ảnh nhé!
            </div>
        </div>
        
        <div id="loader" class="loader">HỆ THỐNG ĐANG XỬ LÝ...</div>

        <div class="footer">
            <div class="input-container">
                <input type="text" id="userInput" class="main-input" placeholder="Hỏi tôi bất cứ điều gì..." onkeydown="if(event.key==='Enter') startGeneration()">
                <button class="btn primary" id="sendBtn" onclick="startGeneration()" style="width: 80px; margin-bottom: 0;">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let currentMimeType = null;
    let isGenerating = false;

    function addMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        msgDiv.innerText = text;
        msgDiv.style.whiteSpace = "pre-wrap";
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const base64 = e.target.result.split(',')[1];
            currentImageBase64 = base64;
            currentMimeType = file.type; // tự động lấy mime type thật (image/jpeg, image/png...)
            
            document.getElementById('img-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImageBase64 = null;
        currentMimeType = null;
        document.getElementById('preview-container').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

    async function callGemini(prompt, base64Data, mimeType, apiKey, retryCount = 0) {
        // Model đang hoạt động tốt nhất hiện nay (tháng 4/2026)
        const modelName = "gemini-2.5-flash";
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
        
        const parts = [{ text: prompt || "Hãy mô tả chi tiết hình ảnh này bằng tiếng Việt." }];
        
        if (base64Data && mimeType) {
            parts.push({
                inlineData: {
                    mimeType: mimeType,
                    data: base64Data
                }
            });
        }

        const payload = {
            contents: [{ parts: parts }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (!response.ok) {
                const errorMsg = result.error?.message || `HTTP ${response.status}`;
                
                // Xử lý lỗi model không tồn tại
                if (errorMsg.includes("not found") || errorMsg.includes("model")) {
                    throw new Error(`Model "${modelName}" không tồn tại hoặc đã bị shutdown. Vui lòng thử lại sau hoặc liên hệ admin.`);
                }
                
                if ((response.status === 429 || response.status >= 500) && retryCount < 3) {
                    const delay = Math.pow(2, retryCount) * 2000;
                    await new Promise(r => setTimeout(r, delay));
                    return callGemini(prompt, base64Data, mimeType, apiKey, retryCount + 1);
                }
                
                throw new Error(errorMsg);
            }

            return result;
        } catch (error) {
            throw error;
        }
    }

    async function startGeneration() {
        const input = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKey');
        const text = input.value.trim();
        const apiKey = apiKeyInput.value.trim();

        if (isGenerating || (!text && !currentImageBase64)) return;
        
        if (!apiKey) {
            addMessage('system', 'Lỗi: Vui lòng dán Gemini API Key vào ô bên trái.');
            return;
        }

        addMessage('user', text || "[Đã gửi một hình ảnh]");
        input.value = '';
        isGenerating = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;

        try {
            const data = await callGemini(text, currentImageBase64, currentMimeType, apiKey);
            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (aiResponse) {
                addMessage('ai', aiResponse);
                if (currentImageBase64) clearImage();
            } else {
                addMessage('system', 'AI không trả về nội dung. Có thể do chính sách an toàn của Google.');
            }
        } catch (err) {
            addMessage('system', `LỖI: ${err.message}`);
            console.error(err);
        } finally {
            isGenerating = false;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }
    }
</script>

</body>
</html>
