<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.5 - Stable Pro</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c28;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 20px 0 10px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .input-group {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .small-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--success);
            padding: 8px 0;
            font-size: 13px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            border: none;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn.primary:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.ai {
            background: var(--card);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .msg.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.system {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
            align-self: center;
            font-size: 13px;
            text-align: center;
        }

        /* Footer Input */
        .footer {
            padding: 24px 40px;
            background: linear-gradient(transparent, var(--bg));
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: var(--card);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .main-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        #preview-container {
            position: relative;
            display: none;
            margin-bottom: 10px;
        }

        #img-preview {
            max-height: 120px;
            border-radius: 12px;
            border: 2px solid var(--accent);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">🚀 SOULY V12.5</div>
        
        <div class="section-label">Xác thực</div>
        <div class="input-group">
            <input type="password" id="apiKey" class="small-input" placeholder="Dán API Key tại đây...">
        </div>

        <div class="section-label">Đa phương tiện</div>
        <button class="btn" onclick="document.getElementById('file-input').click()">
            📸 Thêm hình ảnh
        </button>
        <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
        
        <div id="preview-container">
            <img id="img-preview" src="">
            <button class="btn" style="padding: 4px; margin-top: 5px; font-size: 11px;" onclick="clearImage()">Gỡ ảnh</button>
        </div>

        <div style="margin-top: auto;">
            <button class="btn" onclick="location.reload()">Reset Hội thoại</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg ai">
                Xin chào! Tôi đã tối ưu hóa lại hệ thống kết nối. <br><br>
                Bản <b>V12.5</b> sử dụng model <code>gemini-2.0-flash-preview-09-2025</code> với cơ chế tự động thử lại 5 lần nếu gặp lỗi đường truyền.
            </div>
        </div>
        
        <div id="loader" class="loader">Đang phân tích dữ liệu...</div>

        <div class="footer">
            <div class="input-container">
                <input type="text" id="userInput" class="main-input" placeholder="Nhập câu hỏi của bạn..." onkeydown="if(event.key==='Enter') startGeneration()">
                <button class="btn primary" id="sendBtn" onclick="startGeneration()" style="width: 80px; margin-bottom: 0;">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let isGenerating = false;

    function addMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImageBase64 = e.target.result.split(',')[1];
            document.getElementById('img-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImageBase64 = null;
        document.getElementById('preview-container').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

    async function callGemini(prompt, base64Data, apiKey, retryCount = 0) {
        const model = "gemini-2.5-flash-preview-09-2025";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{
                parts: [
                    { text: prompt || "Phân tích nội dung này" },
                    ...(base64Data ? [{ inlineData: { mimeType: "image/png", data: base64Data } }] : [])
                ]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json();
                // Nếu lỗi 429 (Too many requests) hoặc lỗi server 5xx, thực hiện retry
                if ((response.status === 429 || response.status >= 500) && retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(prompt, base64Data, apiKey, retryCount + 1);
                }
                throw new Error(errorData.error?.message || "Lỗi API");
            }

            return await response.json();
        } catch (error) {
            if (retryCount < 5) {
                const delay = Math.pow(2, retryCount) * 1000;
                await new Promise(resolve => setTimeout(resolve, delay));
                return callGemini(prompt, base64Data, apiKey, retryCount + 1);
            }
            throw error;
        }
    }

    async function startGeneration() {
        const input = document.getElementById('userInput');
        const apiKey = document.getElementById('apiKey').value.trim();
        const text = input.value.trim();

        if (isGenerating || (!text && !currentImageBase64)) return;
        if (!apiKey) {
            addMessage('system', 'Vui lòng nhập API Key để bắt đầu.');
            return;
        }

        addMessage('user', text || "Gửi hình ảnh");
        input.value = '';
        isGenerating = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;

        try {
            const result = await callGemini(text, currentImageBase64, apiKey);
            const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (aiText) {
                addMessage('ai', aiText);
                if (currentImageBase64) clearImage();
            } else {
                addMessage('system', 'Không nhận được phản hồi từ AI. Hãy thử lại.');
            }
        } catch (error) {
            addMessage('system', `LỖI: ${error.message}`);
        } finally {
            isGenerating = false;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }
    }
</script>

</body>
</html>
