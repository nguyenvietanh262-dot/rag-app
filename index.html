<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.1 - Fix Unregistered Callers</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --sidebar: #11111a;
            --card: #161622;
            --accent: #6366f1;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --success: #10b981;
            --error: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
        }

        .btn {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            justify-content: center;
        }

        .btn:hover:not(:disabled) { background: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1a1a2e, var(--bg));
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        .msg.ai { background: var(--card); align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .msg.user { background: var(--accent); align-self: flex-end; color: white; }
        .msg.system { 
            background: rgba(244, 63, 94, 0.1); 
            border: 1px solid var(--error); 
            color: #fda4af; 
            align-self: center; 
            font-size: 13px;
            text-align: center;
        }

        .input-bar {
            padding: 20px 40px;
            display: flex;
            gap: 15px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            background: #1e1e2d;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .preview-box {
            width: 100%;
            height: 140px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .loader {
            display: none;
            font-size: 12px;
            color: var(--text-dim);
            padding: 0 40px 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand"><span>⚡</span> SOULY V12.1</div>
        
        <button class="btn" onclick="document.getElementById('file-in').click()">
            <span>📷</span> Chọn ảnh phân tích
        </button>
        <input type="file" id="file-in" hidden accept="image/*" onchange="handleImage(this)">
        
        <img id="preview" class="preview-box">

        <button class="btn" onclick="location.reload()" style="margin-top: auto; border-color: rgba(255,255,255,0.1);">
            <span>🔄</span> Làm mới ứng dụng
        </button>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg ai">
                Chào bạn! Mình đã cập nhật cơ chế xác thực mới. <br>
                Bây giờ bạn có thể gửi tin nhắn hoặc ảnh mà không lo bị lỗi "Unregistered callers" nữa nhé.
            </div>
        </div>
        
        <div id="loader" class="loader">Souly đang xử lý dữ liệu...</div>

        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Nhập câu hỏi tại đây..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn" id="sendBtn" onclick="send()" style="margin-bottom: 0; min-width: 100px;">GỬI</button>
        </div>
    </div>
</div>

<script>
    // API Key được tự động truyền vào qua môi trường Canvas
    const apiKey = ""; 
    let base64Image = null;
    let isBusy = false;

    function addMessage(role, text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Image = e.target.result.split(',')[1];
            const p = document.getElementById('preview');
            p.src = e.target.result;
            p.style.display = 'block';
            addMessage('ai', '<i>Đã nhận ảnh. Nhấn Gửi để mình phân tích nhé!</i>');
        };
        reader.readAsDataURL(file);
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        
        if (isBusy || (!text && !base64Image)) return;

        addMessage('user', text || "Phân tích hình ảnh này");
        input.value = '';
        setLoading(true);

        const payload = {
            contents: [{
                parts: [
                    { text: text || "Hãy mô tả chi tiết hình ảnh này cho tôi." },
                    ...(base64Image ? [{ inlineData: { mimeType: "image/png", data: base64Image } }] : [])
                ]
            }]
        };

        try {
            // Sử dụng endpoint chuẩn với API Key
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetchWithRetry(url, payload);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || "Lỗi API không xác định");
            }

            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Mình không nhận được câu trả lời, hãy thử lại nhé.";
            addMessage('ai', aiResponse);
            
            // Xóa ảnh sau khi gửi thành công để tránh gửi lặp
            if (base64Image) {
                base64Image = null;
                document.getElementById('preview').style.display = 'none';
            }

        } catch (err) {
            console.error(err);
            addMessage('system', `<b>LỖI HỆ THỐNG:</b><br>${err.message}<br><small>Vui lòng kiểm tra kết nối mạng hoặc thử lại sau vài giây.</small>`);
        } finally {
            setLoading(false);
        }
    }

    async function fetchWithRetry(url, payload, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.status === 429) { // Rate limit
                    await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                    continue;
                }
                return res;
            } catch (e) {
                if (i === retries - 1) throw e;
                await new Promise(r => setTimeout(r, 1000 * (i + 1)));
            }
        }
    }

    function setLoading(loading) {
        isBusy = loading;
        document.getElementById('sendBtn').disabled = loading;
        document.getElementById('loader').style.display = loading ? 'block' : 'none';
    }
</script>

</body>
</html>
