<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.9.4 - Hội thoại đa luồng</title>
    <style>
        :root {
            --bg: #0d0d12;
            --sidebar: #15151e;
            --card: #1c1c28;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: rgba(255,255,255,0.08);
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow: hidden; 
        }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar cho danh sách đoạn chat */
        .sidebar {
            width: 320px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; 
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .brand { font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .chat-item {
            padding: 12px 15px; border-radius: 8px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 14px; color: var(--text-dim);
        }
        .chat-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .chat-item.active { background: rgba(139, 92, 246, 0.15); color: white; border-color: var(--accent); }
        .chat-item .delete-chat { opacity: 0; color: var(--error); padding: 4px; transition: 0.2s; }
        .chat-item:hover .delete-chat { opacity: 1; }

        .section-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin: 15px 0 8px; letter-spacing: 1px; font-weight: bold; }

        .input-group, select {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px; margin-bottom: 10px;
            width: 100%; color: white; outline: none; font-size: 13px;
        }

        .btn {
            background: var(--card); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px;
            cursor: pointer; width: 100%; margin-bottom: 8px; font-size: 13px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { border-color: var(--accent); background: rgba(139, 92, 246, 0.1); }
        .btn.primary { background: var(--accent); border: none; font-weight: 600; }

        /* Vùng chat chính */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0f; position: relative; }

        #messages {
            flex: 1; overflow-y: auto; padding: 30px;
            display: flex; flex-direction: column; gap: 24px;
        }

        .msg {
            max-width: 85%; padding: 16px 20px; border-radius: 15px;
            line-height: 1.7; font-size: 15px; word-wrap: break-word;
            animation: slideUp 0.3s ease-out; position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.ai { 
            background: var(--card); align-self: flex-start; 
            border: 1px solid rgba(255,255,255,0.05);
            color: #e2e8f0;
        }

        /* Định dạng nội dung tin nhắn AI */
        .msg.ai strong { color: var(--accent); }
        .msg.ai p { margin: 8px 0; }
        .msg.ai ul, .msg.ai ol { margin: 10px 0; padding-left: 25px; }
        .msg.ai li { margin-bottom: 5px; }

        .msg.user { background: var(--accent); color: white; align-self: flex-end; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2); }
        
        .msg-image { 
            max-width: 100%; border-radius: 8px; margin-bottom: 10px; 
            display: block; border: 1px solid rgba(255,255,255,0.1);
        }

        .msg.system { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #fca5a5; align-self: center; font-size: 13px; border-radius: 8px; }

        .timestamp { font-size: 10px; opacity: 0.5; margin-top: 8px; display: block; text-align: right; }

        .footer { padding: 20px 40px; background: linear-gradient(to top, #0a0a0f 80%, transparent); }

        .input-container {
            display: flex; gap: 12px; background: var(--card);
            padding: 8px 15px; border-radius: 12px;
            border: 1px solid var(--border); align-items: center;
        }

        .main-input {
            flex: 1; background: transparent; border: none;
            padding: 10px; color: white; font-size: 15px; outline: none;
        }

        #preview-bar {
            display: none; padding: 10px 40px; background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
        }
        .preview-thumb {
            width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
            border: 2px solid var(--accent); position: relative;
        }

        .loader {
            display: none; position: absolute; bottom: 100px; left: 50%;
            transform: translateX(-50%); background: var(--card);
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--accent);
            font-size: 12px; color: var(--accent); z-index: 10;
        }

        pre { 
            background: #000; padding: 12px; border-radius: 8px; 
            overflow-x: auto; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        code { font-family: inherit; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        
        /* Scrollbar tinh tế */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand">SOULY VAULT V12.9.4</div>
            <button class="btn primary" onclick="createNewChat()">+ Hội thoại mới</button>
            
            <div class="section-label">Cài đặt</div>
            <input type="password" id="apiKey" class="input-group" placeholder="Nhập API Key...">
            <select id="modelSelect" class="input-group">
                <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            </select>
        </div>

        <div class="section-label" style="padding: 0 20px;">Lịch sử trò chuyện</div>
        <div id="chatList" class="chat-list">
            <!-- Danh sách các đoạn chat sẽ hiện ở đây -->
        </div>

        <div style="padding: 20px; margin-top: auto; border-top: 1px solid var(--border);">
            <button class="btn" onclick="clearAllData()">🗑️ Xóa tất cả dữ liệu</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages"></div>
        <div id="loader" class="loader">Souly đang xử lý...</div>

        <div id="preview-bar">
            <div style="position: relative; display: inline-block;">
                <img id="img-preview" class="preview-thumb" src="">
                <button onclick="clearImage()" style="position: absolute; -10px; right: -10px; background: var(--error); border: none; color: white; border-radius: 50%; cursor: pointer; width: 20px; height: 20px; font-size: 10px;">✕</button>
            </div>
        </div>

        <div class="footer">
            <div class="input-container">
                <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-dim);">🖼️</button>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
                
                <input type="text" id="userInput" class="main-input" placeholder="Hỏi Souly bất cứ điều gì..." onkeydown="if(event.key==='Enter' && !isGenerating) startGeneration()">
                <button class="btn primary" id="sendBtn" onclick="startGeneration()" style="width: auto; margin: 0; padding: 10px 20px;">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem('souly_sessions')) || [];
    let activeSessionId = localStorage.getItem('souly_active_session') || null;
    let currentImageBase64 = null;
    let currentMimeType = null;
    let isGenerating = false;

    // Khởi tạo ứng dụng
    function init() {
        if (sessions.length === 0) {
            createNewChat();
        } else {
            renderChatList();
            loadSession(activeSessionId || sessions[0].id);
        }
    }

    function createNewChat() {
        const id = 'chat_' + Date.now();
        const newSession = {
            id: id,
            title: 'Cuộc trò chuyện mới',
            messages: [],
            timestamp: new Date().toISOString()
        };
        sessions.unshift(newSession);
        saveSessions();
        renderChatList();
        loadSession(id);
    }

    function saveSessions() {
        localStorage.setItem('souly_sessions', JSON.stringify(sessions));
        localStorage.setItem('souly_active_session', activeSessionId);
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        sessions.forEach(session => {
            const item = document.createElement('div');
            item.className = `chat-item ${session.id === activeSessionId ? 'active' : ''}`;
            item.onclick = () => loadSession(session.id);
            
            const title = document.createElement('span');
            title.textContent = session.title.length > 25 ? session.title.substring(0, 25) + '...' : session.title;
            
            const delBtn = document.createElement('span');
            delBtn.className = 'delete-chat';
            delBtn.innerHTML = '✕';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteSession(session.id);
            };

            item.appendChild(title);
            item.appendChild(delBtn);
            list.appendChild(item);
        });
    }

    function loadSession(id) {
        activeSessionId = id;
        const session = sessions.find(s => s.id === id);
        if (!session) return;

        document.getElementById('messages').innerHTML = '';
        session.messages.forEach(msg => {
            displayMessageUI(msg.role, msg.text, msg.time, msg.image);
        });
        
        saveSessions();
        renderChatList();
    }

    function deleteSession(id) {
        sessions = sessions.filter(s => s.id !== id);
        if (activeSessionId === id) {
            activeSessionId = sessions.length > 0 ? sessions[0].id : null;
        }
        if (sessions.length === 0) createNewChat();
        saveSessions();
        renderChatList();
        if (activeSessionId) loadSession(activeSessionId);
    }

    function clearAllData() {
        if(confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử và cài đặt không?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function formatResponse(text) {
        // Xử lý xuống dòng và đoạn văn
        let formatted = text.split('\n').map(line => {
            if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
                return `<li>${line.trim().substring(2)}</li>`;
            }
            return line.trim() === '' ? '<br>' : `<p>${line}</p>`;
        }).join('');

        // Wrap list items
        formatted = formatted.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>').replace(/<\/ul><ul>/g, '');

        // In đậm và Code
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        formatted = formatted.replace(/`(.*?)`/g, '<code>$1</code>');

        return formatted;
    }

    function displayMessageUI(role, text, time, image = null) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        
        let htmlContent = '';
        if (image) {
            htmlContent += `<img src="${image}" class="msg-image" onclick="window.open(this.src)">`;
        }
        
        const textContent = role === 'ai' ? formatResponse(text) : text;
        htmlContent += `<div>${textContent}</div><span class="timestamp">${time}</span>`;
        
        div.innerHTML = htmlContent;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentImageBase64 = e.target.result;
            document.getElementById('img-preview').src = e.target.result;
            document.getElementById('preview-bar').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImageBase64 = null;
        document.getElementById('preview-bar').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

    async function startGeneration() {
        const textInput = document.getElementById('userInput');
        const text = textInput.value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('modelSelect').value;

        if (isGenerating || (!text && !currentImageBase64)) return;
        if (!apiKey) {
            displayMessageUI('system', 'Vui lòng nhập API Key ở menu bên trái.', 'Hệ thống');
            return;
        }

        const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        const imgToSave = currentImageBase64; // Lưu base64 của ảnh hiện tại

        // Hiển thị tin nhắn người dùng
        displayMessageUI('user', text || "[Hình ảnh]", time, imgToSave);
        
        // Cập nhật session data
        const session = sessions.find(s => s.id === activeSessionId);
        session.messages.push({ role: 'user', text: text || "[Hình ảnh]", time, image: imgToSave });
        if (session.title === 'Cuộc trò chuyện mới' && text) {
            session.title = text.substring(0, 30);
            renderChatList();
        }

        textInput.value = '';
        const promptForAI = text;
        const savedImgBase64 = currentImageBase64 ? currentImageBase64.split(',')[1] : null;
        const savedMime = currentImageBase64 ? currentImageBase64.split(';')[0].split(':')[1] : null;

        clearImage();
        isGenerating = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            const parts = [{ text: promptForAI || "Hãy mô tả hình ảnh này bằng tiếng Việt." }];
            
            if (savedImgBase64) {
                parts.push({ inlineData: { mimeType: savedMime, data: savedImgBase64 } });
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts }],
                    systemInstruction: { parts: [{ text: "Bạn là Souly, một trợ lý thông minh. Luôn trả lời bằng tiếng Việt. Trình bày chi tiết, xuống dòng rõ ràng giữa các ý chính. Nếu có danh sách hãy dùng gạch đầu dòng." }] }
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const aiResponse = data.candidates[0].content.parts[0].text;
            const aiTime = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            displayMessageUI('ai', aiResponse, aiTime);
            session.messages.push({ role: 'ai', text: aiResponse, time: aiTime });
            saveSessions();

        } catch (err) {
            displayMessageUI('system', 'Lỗi: ' + err.message, 'Hệ thống');
        } finally {
            isGenerating = false;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }
    }

    init();
</script>
</body>
</html>
