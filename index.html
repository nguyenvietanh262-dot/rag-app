<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12.9.6 - Gemini 2.5 Flash Lite Optimized</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --sidebar: #121218;
            --card: #181823;
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --error: #f87171;
            --border: rgba(255,255,255,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        .app-layout { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-brand { padding: 24px; border-bottom: 1px solid var(--border); }
        .brand-name { font-size: 1.2rem; font-weight: 800; background: linear-gradient(45deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .brand-ver { font-size: 10px; color: var(--text-dim); margin-left: 5px; opacity: 0.6; }

        .chat-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-item {
            padding: 10px 14px; border-radius: 10px; cursor: pointer;
            margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between;
            font-size: 14px; color: var(--text-dim); transition: 0.2s;
            border: 1px solid transparent;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .chat-item.active { background: rgba(167, 139, 250, 0.1); color: var(--accent); border-color: rgba(167, 139, 250, 0.2); }
        .delete-btn { opacity: 0; font-size: 12px; padding: 4px; }
        .chat-item:hover .delete-btn { opacity: 0.6; }
        .delete-btn:hover { opacity: 1; color: var(--error); }

        .settings-area { padding: 16px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .input-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; display: block; font-weight: 700; }
        
        select, .config-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; outline: none;
        }
        select:focus, .config-input:focus { border-color: var(--accent); }

        /* Main Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #08080a; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 20px; }

        .msg-bubble {
            max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.6;
            font-size: 15px; position: relative; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-bubble.user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg-bubble.ai { align-self: flex-start; background: var(--card); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg-bubble.system { align-self: center; background: rgba(248, 113, 113, 0.1); color: var(--error); font-size: 12px; border-radius: 8px; border: 1px solid rgba(248, 113, 113, 0.2); }

        .msg-img { max-width: 100%; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .meta { font-size: 10px; opacity: 0.5; margin-top: 6px; display: block; }
        .user .meta { color: #000; opacity: 0.6; }

        /* Controls */
        .control-panel { padding: 20px 10%; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .input-wrapper {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 8px 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .text-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 15px; outline: none; }
        
        .action-btn {
            background: transparent; border: none; color: var(--text-dim);
            cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        .send-btn { background: var(--accent); color: #000; font-weight: bold; padding: 8px 18px; border-radius: 12px; }
        .send-btn:hover { background: var(--accent-hover); transform: scale(1.02); }
        .send-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        #image-preview-container {
            display: none; padding: 10px; background: var(--card); border-radius: 12px;
            margin-bottom: 10px; border: 1px solid var(--accent); position: relative;
            width: fit-content;
        }
        .preview-img { height: 80px; border-radius: 8px; }
        .remove-img { position: absolute; top: -8px; right: -8px; background: var(--error); border: none; border-radius: 50%; color: white; cursor: pointer; width: 20px; height: 20px; }

        .loader { display: none; text-align: center; font-size: 12px; color: var(--accent); margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }

        pre { background: #000; padding: 14px; border-radius: 10px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }
        code { font-family: 'Consolas', monospace; font-size: 13px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-name">SOULY VAULT</span>
            <span class="brand-ver">V12.9.6</span>
        </div>
        
        <div class="chat-list" id="chatList"></div>

        <div class="settings-area">
            <button class="send-btn" style="width: 100%; margin-bottom: 20px;" onclick="createNewChat()">+ Hội thoại mới</button>
            
            <label class="input-label">Mô hình hoạt động</label>
            <select id="modelSelect">
                <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash Lite (Preview)</option>
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (Ổn định)</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            </select>

            <label class="input-label">Google API Key</label>
            <input type="password" id="apiKeyInput" class="config-input" placeholder="Nhập key của bạn...">
            
            <button class="action-btn" style="width: 100%; font-size: 11px; margin-top: 10px;" onclick="clearStorage()">Dọn dẹp bộ nhớ</button>
        </div>
    </div>

    <div class="main-chat">
        <div id="messages"></div>
        
        <div class="control-panel">
            <div id="loader" class="loader">SOULY ĐANG XỬ LÝ...</div>
            
            <div id="image-preview-container">
                <img id="preview-img" class="preview-img">
                <button class="remove-img" onclick="clearImage()">✕</button>
            </div>

            <div class="input-wrapper">
                <button class="action-btn" onclick="document.getElementById('file-input').click()">📎</button>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleImage(this)">
                
                <input type="text" id="userInput" class="text-input" placeholder="Hỏi Souly bất cứ điều gì..." onkeydown="if(event.key==='Enter') sendMessage()">
                
                <button id="sendBtn" class="send-btn" onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem('souly_v12_sessions')) || [];
    let currentId = localStorage.getItem('souly_v12_active') || null;
    let currentImgBase64 = null;
    let isWorking = false;

    // --- Core Functions ---
    function init() {
        const savedKey = localStorage.getItem('souly_v12_key');
        if (savedKey) document.getElementById('apiKeyInput').value = savedKey;

        if (sessions.length === 0) {
            createNewChat();
        } else {
            renderChatList();
            switchChat(currentId || sessions[0].id);
        }
    }

    function createNewChat() {
        const id = 'session_' + Date.now();
        const newSession = {
            id,
            title: 'Hội thoại mới',
            msgs: [],
            created: new Date().toISOString()
        };
        sessions.unshift(newSession);
        save();
        renderChatList();
        switchChat(id);
    }

    function switchChat(id) {
        currentId = id;
        localStorage.setItem('souly_v12_active', id);
        const session = sessions.find(s => s.id === id);
        if (!session) return;

        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = '';
        session.msgs.forEach(m => displayMsg(m));
        renderChatList();
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    function displayMsg({ role, text, image, time }) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg-bubble ${role}`;
        
        let html = '';
        if (image) html += `<img src="${image}" class="msg-img">`;
        
        // Simple Markdown
        const cleanText = text
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/\n/g, '<br>');

        html += `<div>${cleanText}</div><span class="meta">${time}</span>`;
        div.innerHTML = html;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentImgBase64 = e.target.result;
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('image-preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        currentImgBase64 = null;
        document.getElementById('image-preview-container').style.display = 'none';
        document.getElementById('file-input').value = '';
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        sessions.forEach(s => {
            const el = document.createElement('div');
            el.className = `chat-item ${s.id === currentId ? 'active' : ''}`;
            el.onclick = () => switchChat(s.id);
            
            const name = s.title.length > 20 ? s.title.substring(0, 20) + '...' : s.title;
            el.innerHTML = `<span>${name}</span><span class="delete-btn" onclick="deleteChat(event, '${s.id}')">✕</span>`;
            list.appendChild(el);
        });
    }

    function deleteChat(e, id) {
        e.stopPropagation();
        sessions = sessions.filter(s => s.id !== id);
        if (currentId === id) currentId = sessions.length > 0 ? sessions[0].id : null;
        if (sessions.length === 0) createNewChat();
        save();
        renderChatList();
        if (currentId) switchChat(currentId);
    }

    function save() {
        localStorage.setItem('souly_v12_sessions', JSON.stringify(sessions));
        const key = document.getElementById('apiKeyInput').value;
        localStorage.setItem('souly_v12_key', key);
    }

    function clearStorage() {
        if(confirm("Xóa tất cả dữ liệu vĩnh viễn?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- API Logic ---
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const model = document.getElementById('modelSelect').value;

        if (isWorking || (!text && !currentImgBase64)) return;
        if (!apiKey) {
            displayMsg({ role: 'system', text: 'Vui lòng nhập API Key trong phần cài đặt!', time: 'Lỗi' });
            return;
        }

        isWorking = true;
        const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        const currentSession = sessions.find(s => s.id === currentId);
        
        // Cập nhật UI User
        const userMsg = { role: 'user', text: text || "[Hình ảnh]", image: currentImgBase64, time };
        displayMsg(userMsg);
        currentSession.msgs.push(userMsg);
        
        if (currentSession.title === 'Hội thoại mới' && text) {
            currentSession.title = text;
            renderChatList();
        }

        // Prepare Payload
        const parts = [{ text: text || "Hãy phân tích hình ảnh này." }];
        if (currentImgBase64) {
            const [meta, data] = currentImgBase64.split(',');
            const mime = meta.split(':')[1].split(';')[0];
            parts.push({ inlineData: { mimeType: mime, data } });
        }

        const payload = {
            contents: [{ parts }],
            systemInstruction: { parts: [{ text: "Bạn là Souly, trợ lý AI thông minh sử dụng mô hình Gemini 2.5 Flash Lite. Hãy trả lời ngắn gọn, súc tích và luôn dùng tiếng Việt." }] }
        };

        input.value = '';
        clearImage();
        document.getElementById('loader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;

        try {
            const response = await callWithRetry(model, apiKey, payload);
            const aiText = response.candidates[0].content.parts[0].text;
            const aiTime = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            
            const aiMsg = { role: 'ai', text: aiText, time: aiTime };
            displayMsg(aiMsg);
            currentSession.msgs.push(aiMsg);
            save();
        } catch (err) {
            displayMsg({ role: 'system', text: 'Lỗi API: ' + err.message, time: 'Error' });
        } finally {
            isWorking = false;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }
    }

    async function callWithRetry(model, key, payload, maxRetries = 3) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        
        for (let i = 0; i < maxRetries; i++) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "Không thể kết nối API");
                return data;
            } catch (e) {
                if (i === maxRetries - 1) throw e;
                await new Promise(r => setTimeout(r, 1500 * (i + 1)));
            }
        }
    }

    init();
</script>
</body>
</html>
