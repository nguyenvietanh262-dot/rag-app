<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AI Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes pulse-border { 0% { border-color: rgba(99, 102, 241, 0.2); } 50% { border-color: rgba(99, 102, 241, 0.8); } 100% { border-color: rgba(99, 102, 241, 0.2); } }
        .analyzing { animation: pulse-border 2s infinite; border-width: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-brain text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Vision<span class="text-indigo-400">Explorer</span></h1>
        </div>
        <div id="status-tag" class="text-[10px] px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-400 uppercase font-bold">
            Hệ thống sẵn sàng
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        <!-- Left: Image Area -->
        <div class="flex-[1.5] flex flex-col gap-4">
            <div id="drop-zone" class="flex-1 glass-panel rounded-2xl flex flex-col items-center justify-center relative overflow-hidden group">
                <img id="main-image" class="hidden max-w-full max-h-full object-contain p-4 z-10">
                
                <div id="upload-prompt" class="text-center z-20">
                    <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700 group-hover:border-indigo-500 transition-colors">
                        <i class="fas fa-upload text-2xl text-slate-400 group-hover:text-indigo-400"></i>
                    </div>
                    <p class="text-slate-400 mb-4">Kéo thả hoặc chọn ảnh để phân tích</p>
                    <label class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-full cursor-pointer transition-all font-medium text-sm">
                        Chọn tệp
                        <input type="file" class="hidden" accept="image/*" onchange="processImage(this)">
                    </label>
                </div>

                <div id="scan-bar" class="hidden absolute w-full h-1 bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.8)] top-0 left-0 z-30"></div>
            </div>

            <div class="h-32 glass-panel rounded-2xl p-4 overflow-hidden flex flex-col">
                <h3 class="text-[10px] uppercase font-bold text-slate-500 mb-2">Thông tin ảnh</h3>
                <div id="image-meta" class="text-sm text-slate-300">
                    Chưa có dữ liệu. Hãy tải ảnh lên để AI bắt đầu quét.
                </div>
            </div>
        </div>

        <!-- Right: Chat Area -->
        <div class="flex-1 glass-panel rounded-2xl flex flex-col overflow-hidden border-indigo-500/20">
            <div class="p-4 border-b border-white/5 flex items-center justify-between">
                <span class="text-xs font-bold uppercase text-slate-400">Trợ lý AI</span>
                <button onclick="clearChat()" class="text-[10px] text-slate-500 hover:text-white uppercase">Xóa hội thoại</button>
            </div>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                <div class="bg-slate-800/50 p-3 rounded-xl rounded-tl-none border border-white/5 text-sm leading-relaxed">
                    Chào bạn! Tôi có thể giúp bạn nhìn và phân tích hình ảnh. Bạn hãy tải ảnh lên nhé.
                </div>
            </div>

            <div id="loading-indicator" class="hidden px-4 py-2">
                <div class="flex gap-1">
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            </div>

            <div class="p-4 bg-slate-900/50">
                <div class="relative">
                    <input type="text" id="user-input" 
                           class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 pr-12 text-sm focus:outline-none focus:border-indigo-500 transition-all" 
                           placeholder="Hỏi về ảnh..."
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center hover:bg-indigo-500 transition-colors">
                        <i class="fas fa-paper-plane text-[10px]"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // Sẽ được hệ thống tự điền
        let base64Image = null;

        async function safeApiCall(payload) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let attempts = 0;
            const maxAttempts = 5;

            while (attempts < maxAttempts) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return await response.json();
                    if (response.status === 429) {
                        await new Promise(r => setTimeout(r, Math.pow(2, attempts) * 1000));
                        attempts++;
                        continue;
                    }
                    throw new Error(`HTTP ${response.status}`);
                } catch (e) {
                    attempts++;
                    if (attempts === maxAttempts) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, attempts) * 1000));
                }
            }
        }

        function processImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result.split(',')[1];
                
                // UI Updates
                document.getElementById('upload-prompt').classList.add('hidden');
                const img = document.getElementById('main-image');
                img.src = e.target.result;
                img.classList.remove('hidden');
                
                document.getElementById('image-meta').innerHTML = `
                    <div class="flex gap-4">
                        <span><b class="text-indigo-400">Tên:</b> ${file.name}</span>
                        <span><b class="text-indigo-400">Cỡ:</b> ${(file.size/1024).toFixed(1)} KB</span>
                    </div>
                `;

                startInitialAnalysis();
            };
            reader.readAsDataURL(file);
        }

        async function startInitialAnalysis() {
            if (!base64Image) return;
            
            const scanBar = document.getElementById('scan-bar');
            const dropZone = document.getElementById('drop-zone');
            
            scanBar.classList.remove('hidden');
            scanBar.style.animation = "scan 2s linear infinite";
            dropZone.classList.add('analyzing');
            
            addMessage('ai', "Tôi đang quét hình ảnh này, vui lòng đợi giây lát...");

            try {
                const data = await safeApiCall({
                    contents: [{
                        parts: [
                            { text: "Hãy mô tả ngắn gọn và liệt kê 3 đặc điểm nổi bật nhất bạn thấy trong ảnh này bằng tiếng Việt." },
                            { inlineData: { mimeType: "image/png", data: base64Image } }
                        ]
                    }]
                });

                const responseText = data.candidates[0].content.parts[0].text;
                addMessage('ai', responseText);
            } catch (err) {
                addMessage('ai', "Có lỗi xảy ra khi kết nối. Hãy thử đặt câu hỏi trực tiếp hoặc tải lại ảnh.");
            } finally {
                scanBar.classList.add('hidden');
                dropZone.classList.remove('analyzing');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const loading = document.getElementById('loading-indicator');
            const text = input.value.trim();

            if (!text) return;

            addMessage('user', text);
            input.value = '';
            loading.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const parts = [{ text: text }];
                if (base64Image) {
                    parts.push({ inlineData: { mimeType: "image/png", data: base64Image } });
                }

                const data = await safeApiCall({
                    contents: [{ parts }]
                });

                const aiText = data.candidates[0].content.parts[0].text;
                addMessage('ai', aiText);
            } catch (err) {
                addMessage('ai', "Lỗi: Không thể nhận phản hồi từ AI. Hãy kiểm tra kết nối mạng.");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function addMessage(role, text) {
            const chatBox = document.getElementById('chat-box');
            const msg = document.createElement('div');
            if (role === 'user') {
                msg.className = "ml-auto bg-indigo-600 text-white p-3 rounded-xl rounded-tr-none text-sm max-w-[80%] shadow-lg";
            } else {
                msg.className = "bg-slate-800/80 border border-white/5 p-3 rounded-xl rounded-tl-none text-sm text-slate-200 leading-relaxed max-w-[90%]";
            }
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChat() {
            document.getElementById('chat-box').innerHTML = `
                <div class="bg-slate-800/50 p-3 rounded-xl rounded-tl-none border border-white/5 text-sm leading-relaxed">
                    Đã xóa lịch sử. Bạn muốn hỏi gì về ảnh hiện tại không?
                </div>
            `;
        }
        
        // CSS Animation for scan bar
        const style = document.createElement('style');
        style.textContent = `
            @keyframes scan {
                0% { top: 0; }
                50% { top: 100%; }
                100% { top: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
