<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Vision Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #6366f1; --bg: #030712; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .neural-card { background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        .glow-text { text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }
        .scan-effect::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.2), transparent);
            height: 20%; width: 100%; animation: scanline 3s linear infinite; pointer-events: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Top Bar -->
    <nav class="border-b border-white/5 p-4 flex justify-between items-center bg-gray-950/50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-microchip text-white text-xs"></i>
            </div>
            <span class="font-bold tracking-widest text-sm uppercase glow-text">Neural <span class="text-indigo-400">Assistant</span></span>
        </div>
        <div class="flex gap-4 text-[10px] font-mono text-gray-500">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                CORE_STABLE
            </div>
            <div>LATENCY: <span id="latency-val">--</span>ms</div>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden p-6 gap-6">
        
        <!-- Left: Neural Viewport -->
        <div class="flex-[1.4] flex flex-col gap-4">
            <div id="drop-area" class="flex-1 neural-card rounded-3xl relative overflow-hidden flex items-center justify-center group border-dashed border-2 border-white/5 hover:border-indigo-500/40 transition-all">
                <img id="preview-img" class="hidden max-w-full max-h-full object-contain p-6 z-10">
                
                <div id="placeholder" class="text-center z-20 transition-all group-hover:scale-105">
                    <div class="w-16 h-16 rounded-2xl border border-white/10 flex items-center justify-center mx-auto mb-4 bg-gray-900 shadow-inner">
                        <i class="fas fa-expand text-gray-500 group-hover:text-indigo-400"></i>
                    </div>
                    <p class="text-xs text-gray-500 font-mono">DRAG_AND_DROP_IMAGE_HERE</p>
                    <label class="mt-4 block bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold py-2 px-6 rounded-full cursor-pointer transition-all uppercase tracking-widest">
                        Chọn tệp nguồn
                        <input type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                    </label>
                </div>

                <div id="scanner" class="hidden absolute inset-0 scan-effect z-30"></div>
            </div>

            <!-- Meta Info -->
            <div class="h-24 neural-card rounded-2xl p-4 flex items-center gap-6">
                <div id="img-stats" class="text-[11px] font-mono text-gray-400 space-y-1">
                    <div>FILE_STATUS: <span class="text-gray-600">NULL</span></div>
                    <div>RESOLUTION: <span class="text-gray-600">0x0</span></div>
                </div>
            </div>
        </div>

        <!-- Right: Neural Chat -->
        <div class="flex-1 neural-card rounded-3xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/5 bg-gray-900/30 flex items-center justify-between">
                <span class="text-[10px] font-bold text-gray-500 tracking-tighter uppercase">Neural_Processing_Unit</span>
                <i class="fas fa-circle-nodes text-indigo-500 text-xs"></i>
            </div>

            <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-custom">
                <div class="flex gap-3">
                    <div class="w-6 h-6 rounded bg-indigo-600/20 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-[10px] text-indigo-400"></i>
                    </div>
                    <div class="bg-gray-800/40 p-3 rounded-2xl rounded-tl-none text-xs leading-relaxed text-gray-300">
                        Hệ thống đã sẵn sàng. Hãy cung cấp dữ liệu hình ảnh để tôi phân tích mạng lưới thông tin cho bạn.
                    </div>
                </div>
            </div>

            <div class="p-4 bg-gray-950/50">
                <div class="relative">
                    <input type="text" id="prompt-input" 
                           class="w-full bg-gray-900 border border-white/5 rounded-xl p-3 pl-4 pr-12 text-xs focus:outline-none focus:border-indigo-500/50 transition-all text-gray-200" 
                           placeholder="Nhập yêu cầu phân tích..."
                           onkeypress="if(event.key==='Enter') requestAnalysis()">
                    <button onclick="requestAnalysis()" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-indigo-600 hover:bg-indigo-500 rounded-lg flex items-center justify-center transition-all shadow-lg shadow-indigo-600/20">
                        <i class="fas fa-arrow-up text-[10px] text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentBase64 = null;

        // Hàm nén ảnh để tránh lỗi payload quá lớn
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // Giới hạn max resolution 1024px để ổn định
                        const MAX_SIZE = 1024;
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Chuyển sang base64 với chất lượng 0.7
                        resolve({
                            base64: canvas.toDataURL('image/jpeg', 0.7).split(',')[1],
                            dimensions: `${Math.round(width)}x${Math.round(height)}`
                        });
                    };
                };
            });
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            // UI Feedback
            document.getElementById('placeholder').classList.add('hidden');
            const preview = document.getElementById('preview-img');
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
            
            document.getElementById('img-stats').innerHTML = `
                <div>FILE_STATUS: <span class="text-green-500">OPTIMIZING...</span></div>
                <div>FILE_NAME: <span class="text-indigo-400">${file.name}</span></div>
            `;

            const optimized = await compressImage(file);
            currentBase64 = optimized.base64;
            
            document.getElementById('img-stats').innerHTML = `
                <div>FILE_STATUS: <span class="text-green-500">READY</span></div>
                <div>RESOLUTION: <span class="text-indigo-400">${optimized.dimensions}</span></div>
            `;

            autoAnalyze();
        }

        async function autoAnalyze() {
            addChatMessage('ai', "Đang khởi tạo giao diện phân tích...");
            await performAIQuery("Phân tích hình ảnh này một cách chi tiết bằng tiếng Việt.");
        }

        async function requestAnalysis() {
            const input = document.getElementById('prompt-input');
            const text = input.value.trim();
            if (!text) return;

            addChatMessage('user', text);
            input.value = '';
            await performAIQuery(text);
        }

        async function performAIQuery(userText) {
            const scanner = document.getElementById('scanner');
            scanner.classList.remove('hidden');
            const startTime = Date.now();

            try {
                const payload = {
                    contents: [{
                        parts: [
                            { text: userText }
                        ]
                    }]
                };

                if (currentBase64) {
                    payload.contents[0].parts.push({
                        inlineData: { mimeType: "image/jpeg", data: currentBase64 }
                    });
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi từ bộ não AI.";
                
                addChatMessage('ai', aiResponse);
                document.getElementById('latency-val').innerText = Date.now() - startTime;

            } catch (err) {
                addChatMessage('ai', `LỖI KẾT NỐI: ${err.message}. Hãy thử giảm kích thước ảnh hoặc kiểm tra API.`);
            } finally {
                scanner.classList.add('hidden');
            }
        }

        function addChatMessage(role, text) {
            const stream = document.getElementById('chat-stream');
            const msg = document.createElement('div');
            msg.className = "flex gap-3 animate-in fade-in slide-in-from-bottom-2 duration-300";
            
            const icon = role === 'user' ? 'fa-user text-gray-400' : 'fa-robot text-indigo-400';
            const bg = role === 'user' ? 'bg-indigo-600/10 border border-indigo-500/20 ml-auto rounded-tr-none' : 'bg-gray-800/40 border border-white/5 rounded-tl-none';
            
            msg.innerHTML = `
                ${role === 'ai' ? `<div class="w-6 h-6 rounded bg-indigo-600/10 flex items-center justify-center flex-shrink-0"><i class="fas ${icon} text-[10px]"></i></div>` : ''}
                <div class="${bg} p-3 rounded-2xl text-xs leading-relaxed text-gray-300 max-w-[85%]">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            stream.appendChild(msg);
            stream.scrollTop = stream.scrollHeight;
        }
    </script>
</body>
</html>
