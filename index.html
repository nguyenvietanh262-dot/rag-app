<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Infinity Vault - Stable Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050507; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-border { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.4); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #6366f1, transparent); animation: scan 3s linear infinite; display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Header -->
    <header class="w-full max-w-6xl flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-brain text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter">SOULY <span class="text-indigo-500">VAULT</span></h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Core Engine v3.0 - Stable</span>
                </div>
            </div>
        </div>
        <div id="connection-status" class="hidden md:flex items-center gap-4 text-[10px] font-bold text-gray-400">
            <span class="px-2 py-1 glass rounded-full border border-white/5"><i class="fas fa-microchip mr-1"></i> GPU_OK</span>
            <span id="latency-val" class="px-2 py-1 glass rounded-full border border-white/5"><i class="fas fa-bolt mr-1 text-yellow-500"></i> 0MS</span>
        </div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Visualizer Area -->
        <div class="lg:col-span-7 space-y-4">
            <div id="drop-zone" class="glass rounded-[32px] aspect-video flex flex-col items-center justify-center relative overflow-hidden group cursor-pointer transition-all hover:border-indigo-500/40">
                <div id="scan-line" class="scan-line"></div>
                
                <div id="placeholder" class="text-center p-8 transition-transform group-hover:scale-105">
                    <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                        <i class="fas fa-plus text-indigo-400"></i>
                    </div>
                    <p class="text-sm font-bold text-gray-300">Nạp dữ liệu hình ảnh</p>
                    <p class="text-xs text-gray-500 mt-2">Kéo thả hoặc nhấp để chọn file phân tích</p>
                </div>

                <img id="preview-img" class="hidden absolute inset-0 w-full h-full object-contain p-4 z-10" src="" alt="Preview">
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <div class="glass rounded-2xl p-4 flex items-center justify-between">
                <div class="flex gap-4">
                    <div class="text-[10px]">
                        <p class="text-gray-500 uppercase font-bold">Trạng thái</p>
                        <p id="status-text" class="text-indigo-400 font-mono italic">Awaiting Input...</p>
                    </div>
                </div>
                <button onclick="clearAll()" class="text-xs text-gray-500 hover:text-red-400 transition-colors uppercase font-bold"><i class="fas fa-trash-alt mr-1"></i> Xóa phiên</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="lg:col-span-5 flex flex-col h-[500px] lg:h-auto">
            <div class="glass rounded-[32px] flex-1 flex flex-col overflow-hidden border-indigo-500/10">
                <div class="p-4 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400"><i class="fas fa-terminal mr-2"></i> Neural Console</span>
                    <i class="fas fa-circle text-[8px] text-indigo-500"></i>
                </div>

                <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll">
                    <!-- Initial Message -->
                    <div class="flex justify-start">
                        <div class="max-w-[85%] bg-white/5 border border-white/10 p-3 rounded-2xl rounded-tl-none text-xs leading-relaxed">
                            Chào mừng đến với hệ thống Souly Vault v3. Hãy tải ảnh lên để tôi thực hiện phân tích cấu trúc tri thức.
                        </div>
                    </div>
                </div>

                <div class="p-4 bg-black/20">
                    <div class="relative">
                        <input type="text" id="user-input" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-4 pr-12 text-xs focus:outline-none focus:border-indigo-500/50 transition-all"
                            placeholder="Hỏi về hình ảnh này...">
                        <button id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center hover:bg-indigo-500 transition-all text-white">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // Managed by environment
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        let currentBase64 = null;
        let isProcessing = false;

        // Elements
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.getElementById('placeholder');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');
        const scanLine = document.getElementById('scan-line');
        const latencyVal = document.getElementById('latency-val');

        // Handle File
        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            processImage(file);
        };

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // Resize image to max 1024px to prevent large payload errors
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxDim = 1024;
                    
                    if (width > height && width > maxDim) {
                        height *= maxDim / width;
                        width = maxDim;
                    } else if (height > maxDim) {
                        width *= maxDim / height;
                        height = maxDim;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    previewImg.src = canvas.toDataURL('image/jpeg');
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    statusText.innerText = "Data Synced: READY";
                    addMessage("Hệ thống", `Đã xử lý ảnh (${width}x${height}). Bạn muốn phân tích điều gì?`);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function callGemini(prompt) {
            if (isProcessing) return;
            isProcessing = true;
            statusText.innerText = "Neural Processing...";
            scanLine.style.display = "block";
            const startTime = Date.now();

            const payload = {
                contents: [{
                    parts: [{ text: prompt }]
                }]
            };

            if (currentBase64) {
                payload.contents[0].parts.push({
                    inlineData: { mimeType: "image/jpeg", data: currentBase64 }
                });
            }

            // Exponential backoff retry logic
            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error?.message || "Unknown error");
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không nhận được phản hồi.";
                    
                    addMessage("AI", text);
                    latencyVal.innerHTML = `<i class="fas fa-bolt mr-1 text-yellow-500"></i> ${Date.now() - startTime}MS`;
                    break;
                } catch (err) {
                    if (i === maxRetries - 1) {
                        addMessage("System Error", `Lỗi: ${err.message}. Có thể do lỗi mạng hoặc xác thực. Hãy thử lại sau vài giây.`);
                    } else {
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            }

            isProcessing = false;
            statusText.innerText = "System: STABLE";
            scanLine.style.display = "none";
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'User' ? 'justify-end' : 'justify-start'}`;
            const isError = sender === 'System Error';
            
            div.innerHTML = `
                <div class="max-w-[85%] p-3 rounded-2xl text-xs leading-relaxed ${
                    sender === 'User' ? 'bg-indigo-600 text-white rounded-tr-none' : 
                    isError ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 
                    'bg-white/5 border border-white/10 rounded-tl-none text-gray-300'
                }">
                    ${isError ? '<i class="fas fa-exclamation-triangle mr-1"></i>' : ''}
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleSend() {
            const val = userInput.value.trim();
            if (!val || isProcessing) return;
            
            addMessage("User", val);
            userInput.value = "";
            callGemini(val);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => e.key === 'Enter' && handleSend();

        function clearAll() {
            currentBase64 = null;
            previewImg.classList.add('hidden');
            placeholder.classList.remove('hidden');
            chatBox.innerHTML = '';
            statusText.innerText = "Awaiting Input...";
            addMessage("Hệ thống", "Dữ liệu đã được xóa sạch.");
        }

        // Drag & Drop
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('neon-border'); };
        dropZone.ondragleave = () => dropZone.classList.remove('neon-border');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('neon-border');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) processImage(file);
        };
    </script>
</body>
</html>
