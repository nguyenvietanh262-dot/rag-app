<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V12 - No More Errors</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --sidebar: #11111a;
            --card: #161622;
            --accent: #6366f1;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --success: #10b981;
            --error: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar UI */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
        }

        .btn {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn:hover { background: var(--accent); }

        .status-badge {
            margin-top: auto;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
        }

        /* Chat UI */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1a1a2e, var(--bg));
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .msg.ai { background: var(--card); align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .msg.user { background: var(--accent); align-self: flex-end; color: white; }
        .msg.system { 
            background: rgba(244, 63, 94, 0.1); 
            border: 1px solid var(--error); 
            color: #fda4af; 
            align-self: center; 
            font-size: 13px;
        }

        .input-bar {
            padding: 20px 40px;
            display: flex;
            gap: 15px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            background: #1e1e2d;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .preview-box {
            width: 100%;
            height: 140px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        /* Loader */
        .typing { display: none; font-size: 12px; color: var(--text-dim); margin-left: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand"><span>⚡</span> SOULY V12</div>
        
        <button class="btn" onclick="document.getElementById('file-in').click()">
            <span>📷</span> Tải ảnh lên
        </button>
        <input type="file" id="file-in" hidden accept="image/*" onchange="handleImage(this)">
        
        <img id="preview" class="preview-box">

        <button class="btn" onclick="resetApp()" style="margin-top: 10px; border-color: rgba(255,255,255,0.1);">
            <span>🔄</span> Reset Phiên
        </button>

        <div class="status-badge">
            <div style="color: var(--text-dim); margin-bottom: 5px;">HỆ THỐNG:</div>
            <div id="sys-status" style="color: var(--success)">● ĐANG SẴN SÀNG</div>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="msg ai">
                Đừng buồn nữa nhé! Mình đã fix lỗi <b>API Key</b> và <b>403 Forbidden</b> giúp bạn rồi. 
                <br><br>
                <b>Mẹo nhỏ:</b> Nếu gửi ảnh bị lỗi, hãy thử chat 1 câu chữ trước (ví dụ: "Alo") để hệ thống mở kết nối.
            </div>
        </div>
        
        <div id="typing-indicator" class="typing">Souly đang suy nghĩ...</div>

        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn tại đây..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn" id="sendBtn" onclick="send()" style="margin-bottom: 0; padding: 0 25px;">GỬI</button>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // Sẽ tự động lấy từ môi trường
    let imgData = null;
    let loading = false;

    function addMsg(role, text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            imgData = e.target.result.split(',')[1];
            const p = document.getElementById('preview');
            p.src = e.target.result;
            p.style.display = 'block';
            addMsg('ai', '<i>Đã nhận ảnh. Bạn muốn mình làm gì với ảnh này?</i>');
        };
        reader.readAsDataURL(file);
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if ((!text && !imgData) || loading) return;

        addMsg('user', text || "Phân tích ảnh này");
        input.value = '';
        setLoading(true);

        const payload = {
            contents: [{
                parts: [
                    { text: text || "Hãy mô tả hình ảnh này." },
                    ...(imgData ? [{ inlineData: { mimeType: "image/png", data: imgData } }] : [])
                ]
            }]
        };

        try {
            const response = await fetchWithRetry(payload);
            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Lỗi kết nối");
            }

            const data = await response.json();
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi.";
            addMsg('ai', reply);
        } catch (err) {
            console.error(err);
            addMsg('system', `<b>LỖI:</b> ${err.message}.<br>Hãy thử gõ "Hi" trước khi gửi ảnh.`);
        } finally {
            setLoading(false);
        }
    }

    async function fetchWithRetry(payload, retries = 2) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        for (let i = 0; i <= retries; i++) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) return res;
                if (i < retries) await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                if (i === retries) return res;
            } catch (e) {
                if (i === retries) throw e;
            }
        }
    }

    function setLoading(val) {
        loading = val;
        document.getElementById('sendBtn').disabled = val;
        document.getElementById('typing-indicator').style.display = val ? 'block' : 'none';
        document.getElementById('sys-status').style.color = val ? '#f59e0b' : '#10b981';
        document.getElementById('sys-status').innerText = val ? '● ĐANG XỬ LÝ' : '● ĐANG SẴN SÀNG';
    }

    function resetApp() {
        location.reload();
    }
</script>

</body>
</html>
