<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Vault V5 - Fix Nhập Liệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050507; color: #e2e8f0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(255,255,255,0.08); }
        /* Đảm bảo ô input luôn nằm trên cùng và có thể click */
        #chat-input { 
            position: relative !important; 
            z-index: 999 !important; 
            cursor: text !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .message-stream { height: calc(100vh - 280px); }
        .loading-line { height: 2px; width: 100%; background: #6366f1; position: absolute; top: 0; left: 0; display: none; }
        .loading-line.active { display: block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="flex flex-col h-full">

    <!-- Top Navigation -->
    <nav class="p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center font-bold">S</div>
            <span class="font-bold tracking-widest text-sm">SOULY VAULT <span class="text-indigo-500 underline">V5</span></span>
        </div>
        <div id="status" class="text-[10px] text-green-500 font-mono flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            STABLE_ENGINE_ACTIVE
        </div>
    </nav>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-0 overflow-hidden">
        <!-- Media View (Left) -->
        <div class="lg:col-span-4 border-r border-white/5 p-6 bg-black/20 flex flex-col items-center justify-center relative">
            <div id="upload-box" class="w-full aspect-square glass rounded-2xl flex flex-col items-center justify-center border-dashed border-2 border-white/10 hover:border-indigo-500 transition-all cursor-pointer overflow-hidden relative">
                <div id="prompt-ui" class="text-center">
                    <i class="fas fa-file-import text-3xl text-gray-600 mb-4"></i>
                    <p class="text-sm font-medium">Kéo thả hoặc Click để tải ảnh</p>
                </div>
                <img id="preview-img" class="hidden absolute inset-0 w-full h-full object-contain bg-black" src="">
                <input type="file" id="file-hidden" class="hidden" accept="image/*">
            </div>
            <div class="mt-4 w-full space-y-2">
                <button onclick="document.getElementById('file-hidden').click()" class="w-full py-2 bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 text-xs rounded-lg transition-all">THAY ĐỔI DỮ LIỆU</button>
            </div>
        </div>

        <!-- Chat Console (Right) -->
        <div class="lg:col-span-8 flex flex-col relative">
            <div id="loader" class="loading-line"></div>
            
            <div id="chat-window" class="message-stream overflow-y-auto p-6 space-y-6">
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center text-[10px]">AI</div>
                    <div class="space-y-1">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">System Assistant</p>
                        <div class="text-sm bg-white/5 p-4 rounded-2xl rounded-tl-none leading-relaxed">
                            Chào bạn! Tôi đã gỡ bỏ hoàn toàn các lớp bảo vệ gây lỗi nhập liệu. Bạn hãy thử gõ vào ô bên dưới ngay bây giờ.
                        </div>
                    </div>
                </div>
            </div>

            <!-- NHẬP LIỆU - PHẦN QUAN TRỌNG NHẤT -->
            <div class="p-6 bg-black/60 border-t border-white/10">
                <div class="relative flex items-center glass rounded-2xl p-2 shadow-2xl">
                    <input type="text" id="chat-input" 
                        class="w-full bg-transparent border-none py-4 px-6 text-white text-sm focus:ring-0 focus:outline-none"
                        placeholder="Hãy thử nhập câu hỏi tại đây..."
                        autocomplete="off">
                    
                    <button id="send-trigger" class="h-12 w-12 bg-indigo-600 hover:bg-indigo-500 rounded-xl flex items-center justify-center transition-all shadow-lg shadow-indigo-600/20">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center text-gray-600 mt-4 font-mono tracking-tighter">
                    CTRL + ENTER TO TRANSMIT // DIRECT_INPUT_MODE: ENABLED
                </p>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // API Key tự động được nạp
        const model = "gemini-2.5-flash-preview-09-2025";
        let currentImgBase64 = null;

        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-trigger');
        const chatWindow = document.getElementById('chat-window');
        const fileInput = document.getElementById('file-hidden');
        const previewImg = document.getElementById('preview-img');
        const promptUi = document.getElementById('prompt-ui');
        const loader = document.getElementById('loader');

        // Force focus on start
        window.onload = () => input.focus();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > 1024) { h *= 1024/w; w = 1024; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    previewImg.src = canvas.toDataURL('image/jpeg');
                    previewImg.classList.remove('hidden');
                    promptUi.classList.add('hidden');
                    input.focus();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function handleSend() {
            const text = input.value.trim();
            if(!text) return;

            addMsg("Bạn", text, true);
            input.value = "";
            loader.classList.add('active');

            const payload = {
                contents: [{ parts: [{ text: text }] }]
            };
            if(currentImgBase64) {
                payload.contents[0].parts.push({
                    inlineData: { mimeType: "image/jpeg", data: currentImgBase64 }
                });
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi.";
                addMsg("Souly AI", aiText);
            } catch (e) {
                addMsg("Lỗi", "Kết nối thất bại. Hãy kiểm tra lại mạng.");
            } finally {
                loader.classList.remove('active');
                input.focus();
            }
        }

        function addMsg(sender, text, isUser = false) {
            const div = document.createElement('div');
            div.className = `flex gap-4 ${isUser ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full ${isUser ? 'bg-indigo-500' : 'bg-white/10'} flex-shrink-0 flex items-center justify-center text-[10px] font-bold">${isUser ? 'U' : 'AI'}</div>
                <div class="space-y-1 ${isUser ? 'text-right' : ''}">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">${sender}</p>
                    <div class="text-sm ${isUser ? 'bg-indigo-600' : 'bg-white/5'} p-4 rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} shadow-lg inline-block text-left">
                        ${text}
                    </div>
                </div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        sendBtn.onclick = handleSend;
        input.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
        document.getElementById('upload-box').onclick = () => fileInput.click();
    </script>
</body>
</html>
